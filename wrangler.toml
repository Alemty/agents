name = "job-agent"
main = "src/index.ts"
compatibility_date = "2026-04-11"
account_id = "792fb5a1c2fb0af960074a1e869db0ed"

# Assets (frontend dashboard)
[assets]
directory = "./public"
not_found_handling = "none"

# D1 database (jobs, applications, stats)
[[d1_databases]]
binding = "DB"
database_name = "jobs-db"
database_id = "849ffb99-99bd-427d-95d1-c84166738ac7"

# Environment variables
[vars]
MATCH_THRESHOLD = "60"
MAX_APPLICATIONS_DAY = "20"

# Secrets (set via wrangler secret put)
# LINKEDIN_EMAIL=
# LINKEDIN_PASSWORD=
# ANTHROPIC_API_KEY=

# Routes
routes = [
  { pattern = "agents.alemty.eth.limo", custom_domain = true }
]
